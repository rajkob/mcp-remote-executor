services:
  remote-executor:
    build: .
    image: mcp-remote-executor:latest
    # network_mode: host — container shares the host network stack,
    # including VPN routes, so private subnets (10.24.x.x) are reachable.
    # MCP SSE endpoint:  http://localhost:8765/sse
    # Web dashboard:     http://localhost:8765/dashboard  (same port, path-routed)
    # API endpoints:     http://localhost:8765/api/status  /api/logs
    network_mode: host
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - DATA_DIR=/app/data
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8765
      - MCP_DASHBOARD=true   # set to false to disable the web dashboard
      # Uncomment to enable API key authentication:
      # - MCP_API_KEY=${MCP_API_KEY}
      # Uncomment to enable local Ollama LLM integration (see LOCAL_LLM_SETUP.md):
      # - OLLAMA_URL=http://host.docker.internal:11434
      # - OLLAMA_MODEL=qwen2.5:7b
    restart: unless-stopped
